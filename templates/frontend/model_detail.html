{% extends "frontend/base.html" %}
{% block title %}{{ verbose_name }}{% endblock %}
{% block content %}
  <div class="card">
    <div class="card-header">
      <div>
        <h1 class="text-xl font-semibold">{{ verbose_name }} #{{ object.pk }}</h1>
        <div class="muted">{{ app_label }}.{{ model_name }}</div>
      </div>
      <div class="flex items-center gap-2">
        <a class="btn" href="{{ list_url }}">Voltar</a>
        <a class="btn btn-primary" href="{{ edit_url }}">Editar</a>
        <a class="btn btn-danger" href="{{ delete_url }}">Excluir</a>
      </div>
    </div>
    <div class="card-body">
      <table class="table">
        <tbody>
          {% for name, val in pairs %}
            <tr>
              <th style="width: 260px;">{{ name }}</th>
              <td>{{ val }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
