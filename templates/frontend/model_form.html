{% extends "frontend/base.html" %}
{% block title %}{{ verbose_name }}{% endblock %}
{% block content %}
  <div class="card">
    <div class="card-header">
      <div>
        <h1 class="text-xl font-semibold">{{ verbose_name_plural }}</h1>
        <div class="muted">{{ app_label }}.{{ model_name }}</div>
      </div>
      <a class="btn" href="{{ list_url }}">Voltar</a>
    </div>
    <div class="card-body">
      <form method="post" enctype="multipart/form-data" class="grid" style="gap: 1rem;">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Salvar</button>
      </form>
    </div>
  </div>
{% endblock %}
